<!DOCTYPE html>
<html>
    <head>
        <title>Internship Form</title>
    </head>

    <body>
<h2>Internship Confirmation Form</h2>
<p>The career development office is collecting student information for internship opportunities.</p>

 Student Name: <input type="text" name="student name" > <br><br>
Email Address: <input type="email" name="email"> <br><br>
 Preferred Internship Type: <input type="radio" name="type" value="On-Site"> On-Site
<input type="radio" name="type" value="Remote"> Remote 
<br><br>
Internship Duration: <select name="duration">
    <option>6 Weeks</option>
    <option>3 Weeks</option>
</select><br><br>
Skills of Interest:<br> 
<input type="checkbox" name="skill" value="Web development">Web Development<br>
<input type="checkbox" name="skill" value="Data Analysis">Data Analysis<br>
<input type="checkbox" name="skill" value="Mobile Apps">Mobile Apps<br><br><br>

<input type="submit" value="Submit">
   
    </body>
</html>
